<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>视频加载中</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <main class="stage" id="stage" aria-label="开场视频" data-playback="loading">
    <div class="ambient-backdrop" aria-hidden="true">
      <div class="ambient-blob ambient-blob-a"></div>
      <div class="ambient-blob ambient-blob-b"></div>
      <div class="ambient-blob ambient-blob-c"></div>
      <div class="ambient-band ambient-band-a"></div>
      <div class="ambient-band ambient-band-b"></div>
    </div>

    <div class="frost-layer" aria-hidden="true"></div>

    <div class="video-shell">
      <video
        id="introVideo"
        class="video-main"
        preload="auto"
        playsinline
        webkit-playsinline
        x5-playsinline
        x5-video-player-type="h5"
        muted
      >
        您的浏览器不支持视频播放。
      </video>
    </div>

    <button id="skipBtn" class="skip-btn" type="button" aria-label="跳过视频">跳过</button>
    <button id="startBtn" class="start-btn" type="button" aria-live="polite">正在加载配置...</button>

    <button id="centerState" class="center-state" type="button" data-state="pause" aria-label="暂停">
      <span class="icon-play" aria-hidden="true"></span>
      <span class="icon-pause" aria-hidden="true"></span>
    </button>

    <div id="dyProgress" class="dy-progress" aria-label="播放进度">
      <div class="progress-meta" aria-hidden="true">
        <span id="currentTimeText">00:00</span>
        <span id="totalTimeText">00:00</span>
      </div>
      <input
        id="progressRange"
        class="progress-range"
        type="range"
        min="0"
        max="100"
        step="0.1"
        value="0"
        aria-label="播放进度"
      />
    </div>
  </main>

  <script src="./scripts/main.js"></script>
</body>
</html>
